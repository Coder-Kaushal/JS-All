<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="symbolInput">
                <button title="Rock" class="btn btnRock"></button>
                <button title="Paper" class="btn btnPaper"></button>
                <button title="Scissors" class="btn btnScissors"></button>
            </div>
            <div class="results">
                <div class="score">
                    <p class="scorePlayer">Player: 0</p>
                    <p class="scoreComputer">Computer: 0</p>
                </div>
                <div class="navigation">
                    <button class="btnRestart">Restart</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
